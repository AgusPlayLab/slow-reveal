<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Slow Reveal — Vertical</title>

  <!-- CSS externo -->
  <link rel="stylesheet" href="css/reveal.css" />
</head>

<body>
  <div class="reveal" id="reveal" role="region" aria-label="Comparador de imágenes vertical">

    <!-- Frame: contiene las imágenes (se recortan aquí, NO el handle) -->
    <div class="reveal__frame" aria-hidden="true">
      <!-- Bottom image (siempre visible) -->
      <img
        id="bottomImg"
        class="reveal__img reveal__img--bottom"
        src="images/bottom.jpg"
        alt="Imagen inferior"
        draggable="false"
      />

      <!-- Top layer (recortada por clip-path) -->
      <div class="reveal__top-layer" id="topLayer" aria-hidden="true">
        <img
          id="topImg"
          class="reveal__img reveal__img--top"
          src="images/top.jpg"
          alt="Imagen superior"
          draggable="false"
        />
      </div>
    </div>

    <!-- Slider UI -->
    <div class="reveal__slider" id="slider" aria-hidden="true">
      <div class="reveal__edge-fade" id="edgeFade" aria-hidden="true"></div>
      <div class="reveal__line" aria-hidden="true"></div>

      <button
        class="reveal__handle"
        id="handle"
        type="button"
        aria-label="Arrastra verticalmente para revelar"
        title="Arrastra"
      >
        <!-- Icono up/down -->
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 6v12"></path>
          <path d="M8 10l4-4 4 4"></path>
          <path d="M8 14l4 4 4-4"></path>
        </svg>
      </button>
    </div>

    <!-- Texto instructivo -->
    <div class="reveal__hint" id="hint">Desliza hacia abajo ↓</div>
  </div>

  <!-- JS -->
  <script src="js/reveal.js"></script>
</body>
</html>
