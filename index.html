<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Slow Reveal — Vertical</title>

  <!-- SEO básico -->
  <meta name="description" content="Empieza arriba… y desliza despacio. Hay algo esperándote más abajo." />
  <link rel="canonical" href="https://agusplaylab.github.io/slow-reveal/" />

  <!-- Open Graph -->
  <meta property="og:title" content="Empieza arriba…" />
  <meta property="og:description" content="Desliza despacio ↓" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://agusplaylab.github.io/slow-reveal/" />
  <meta property="og:site_name" content="AgusPlayLab" />

  <!-- Preview image -->
  <meta property="og:image" content="https://agusplaylab.github.io/slow-reveal/preview.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Desliza para descubrir" />
  <meta property="og:image:type" content="image/jpeg" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Empieza arriba…" />
  <meta name="twitter:description" content="No bajes demasiado rápido ↓" />
  <meta name="twitter:image" content="https://agusplaylab.github.io/slow-reveal/preview.jpg" />

  <!-- CSS (cache-buster) -->
  <link rel="stylesheet" href="css/reveal.css?v=13" />
</head>

<body>
  <div class="reveal is-loading" id="reveal" role="region" aria-label="Comparador de imágenes vertical">

    <!-- progreso -->
    <div class="reveal__progress" id="progress" aria-hidden="true"></div>

    <!-- canvas (JS fija width/height para contain real) -->
    <div class="reveal__canvas" id="canvas" aria-hidden="true">
      <img id="bottomImg" class="reveal__img reveal__img--bottom" alt="Imagen inferior" />
      <img id="topImg" class="reveal__img reveal__img--top" alt="Imagen superior" />

      <div class="reveal__slider" id="slider" aria-hidden="true">
        <div class="reveal__edge-fade" id="edgeFade" aria-hidden="true"></div>
        <div class="reveal__line" aria-hidden="true"></div>

        <button class="reveal__handle" id="handle" type="button"
                aria-label="Arrastra verticalmente para revelar" title="Arrastra">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 6v12"></path>
            <path d="M8 10l4-4 4 4"></path>
            <path d="M8 14l4 4 4-4"></path>
          </svg>
        </button>
      </div>
    </div>

    <!-- hint -->
    <div class="reveal__hint" id="hint" aria-hidden="true">
      <span class="hint__down">Desliza hacia abajo 🤪</span>
      <span class="hint__up">Desliza hacia arriba 🙂</span>
    </div>

    <div class="reveal__veil" aria-hidden="true"></div>
  </div>

  <!-- JS (cache-buster) -->
  <script src="js/reveal.js?v=13" defer></script>
</body>
</html>
